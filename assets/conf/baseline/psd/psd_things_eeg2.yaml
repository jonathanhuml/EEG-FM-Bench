# PSD — single-task frozen-feature baseline on THINGS-EEG2
# Binary classification: non-target vs target (RSVP paradigm)
# WelchPSDEncoder is parameter-free; only the classification head is trained.
#
# Usage:
#   torchrun --nproc_per_node=1 baseline_main.py \
#     conf_file=assets/conf/baseline/psd/psd_things_eeg2.yaml model_type=psd

seed: 42
master_port: 51303
multitask: false
model_type: 'psd'
fs: 256

data:
  batch_size: 64
  num_workers: 2
  datasets:
    things_eeg_2: 'finetune'

model:
  nperseg: 256       # 1 s window at 256 Hz
  noverlap: null     # null → nperseg // 2 (50% overlap)
  fmin: 1.0
  fmax: 45.0

  classifier_head:
    head_type: 'avg_pool'
    hidden_dims: [128]
    dropout: 0.3

  t_sne: false

training:
  max_epochs: 50
  weight_decay: 0.01
  max_grad_norm: 1.0

  lr_schedule: 'cosine'
  max_lr: 4e-4
  encoder_lr_scale: 0.0
  warmup_epochs: 5
  warmup_scale: 1e-2
  pct_start: 0.2
  min_lr: 4e-6

  freeze_encoder: true
  use_amp: false

  lora:
    use_lora: false

logging:
  experiment_name: 'psd_things_eeg2'
  run_dir: 'assets/run'
  use_cloud: false
  offline: false
  tags: ['psd', 'things_eeg2', 'frozen', 'avg_pool', 'single_task']
  log_step_interval: 10
  ckpt_interval: 10
