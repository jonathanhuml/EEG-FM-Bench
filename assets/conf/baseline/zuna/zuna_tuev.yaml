# ZUNA — single-task frozen-backbone on TUEV
# Table 4 reproduction: avg_pool head, freeze_encoder=true, 256 Hz
#
# Usage:
#   torchrun --nproc_per_node=1 baseline_main.py \
#     conf_file=assets/conf/baseline/zuna/zuna_tuev.yaml model_type=zuna

seed: 42
master_port: 51200
multitask: true    # single shared model (unified training path)
model_type: 'zuna'

data:
  batch_size: 32
  num_workers: 2
  datasets:
    tuev: 'finetune'

model:
  pretrained_repo: 'Zyphra/ZUNA'
  pretrained_weights_file: 'model-00001-of-00001.safetensors'
  pretrained_config_file: 'config.json'

  n_fine: 32
  encoder_output_dim: 32

  classifier_head:
    head_type: 'avg_pool'
    hidden_dims: [128]
    dropout: 0.3
    attn_n_head: 4
    attn_head_dim: 64
    fusion_mode: 'dual'
    fusion_n_head: 4
    fusion_head_dim: 64
    fusion_use_rope: true
    fusion_rope_theta: 10000.0
    fusion_max_seq_len: 1024

  # Enable t-SNE feature extraction for visualization
  t_sne: false  # set to true when running plot_vis.py

training:
  max_epochs: 50
  weight_decay: 0.01
  max_grad_norm: 1.0

  lr_schedule: 'cosine'
  max_lr: 4e-4
  encoder_lr_scale: 0.0   # encoder is frozen; this has no effect
  warmup_epochs: 5
  warmup_scale: 1e-2
  pct_start: 0.2
  min_lr: 4e-6

  freeze_encoder: true
  use_amp: false

  lora:
    use_lora: false

logging:
  experiment_name: 'zuna_tuev'
  run_dir: 'assets/run'
  use_cloud: false
  offline: false
  tags: ['zuna', 'tuev', 'frozen', 'avg_pool', 'single_task']
  log_step_interval: 10
  ckpt_interval: 10
