# t-SNE visualization config for ZUNA on TUEV
# ckpt_path is filled in at runtime by run_tuev_benchmark.py

model_type: 'zuna'

# Checkpoint path (filled in automatically by the benchmark script,
# or override manually after training)
ckpt_path: ''

output_dir: 'assets/vis/tuev/zuna/tsne'

seed: 42

datasets:
  tuev: 'finetune'

tag: ['zuna', 'tuev', 'tsne']

split: 'test'

num_batch: 500
perplexity: 30
small_perplexity: 10
use_pca: false
pca_dims: 50
max_iter: 1000
